<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Irdmi messenger(Chat v2)</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>
  <div class="app">
    <!-- Auth Screen -->
    <div id="auth-screen" class="screen active">
      <div class="auth-container">
        <h1>Irdmi messenger</h1>
        <p class="subtitle">End-to-end encrypted messaging</p>
        
        <!-- Login Form -->
        <div id="login-form" class="auth-form">
          <h2>Login</h2>
          <input type="text" id="login-username" placeholder="Username" autocomplete="username">
          <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
          <button onclick="login()" class="primary-btn">Login</button>
          <p class="auth-switch">Don't have an account? <a href="#" onclick="showRegister()">Register</a></p>
        </div>
        
        <!-- Register Form -->
        <div id="register-form" class="auth-form hidden">
          <h2>Register</h2>
          <input type="text" id="register-username" placeholder="Username" autocomplete="username">
          <input type="password" id="register-password" placeholder="Password" autocomplete="new-password">
          <input type="text" id="register-invite" placeholder="Invite Code (optional)">
          <button onclick="register()" class="primary-btn">Register</button>
          <p class="auth-switch">Already have an account? <a href="#" onclick="showLogin()">Login</a></p>
        </div>
      </div>
    </div>
    
    <!-- Chat Screen -->
    <div id="chat-screen" class="screen hidden">
      <header class="header">
        <button id="menu-btn" class="icon-btn" aria-label="Menu">☰</button>
        <h1 id="chat-title">Chat</h1>
        <button id="reload-btn" class="icon-btn small-btn" aria-label="Reload">↻</button>
      </header>
      
      <div id="chat-area">
        <div id="messages" class="messages-container"></div>
        <div class="input-area">
          <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off">
          <button class="send-btn" onclick="sendMessage()" aria-label="Send">➤</button>
        </div>
      </div>
    </div>
    
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <h3>Chats</h3>
        <button id="close-sidebar" class="close-btn" aria-label="Close">✕</button>
      </div>
      <ul id="chat-list"></ul>
      <div class="sidebar-footer">
        <button onclick="showCreateChat()" class="secondary-btn full-width">+ New Chat</button>
        <div class="user-info">
          <span id="current-username"></span>
          <button onclick="logout()" class="logout-btn">Logout</button>
        </div>
      </div>
    </aside>
    
    <!-- Overlay -->
    <div id="overlay" class="overlay hidden"></div>
    
    <!-- Create Chat Modal -->
    <div id="create-chat-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Create New Chat</h3>
          <button onclick="closeModal()" class="close-btn">✕</button>
        </div>
        <input type="text" id="new-chat-name" placeholder="Chat name (required)" maxlength="50">
        <div class="modal-actions">
          <button onclick="createChat()" class="primary-btn">Create</button>
          <button onclick="closeModal()" class="secondary-btn">Cancel</button>
        </div>
      </div>
    </div>
    
    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>
  </div>
  
  <script src="app.js"></script>
</body>
</html>
